name: Good First Issue
description: Internal template for maintainers
labels: ["good first issue", "help wanted"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task Description
      placeholder: What needs to be done?

  - type: textarea
    id: guidance
    attributes:
      label: Implementation Guidance
      placeholder: Where to look, hints, files

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria